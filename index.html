<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線上工具箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-title" href="index.html">線上工具箱</a>
  </nav>
  <div class="subbar">選擇下方工具開始使用</div>

  <div class="container">
    <div class="tool-grid">

      <a class="tool-card" href="tools/pdf.html">
        <div class="icon">📄</div>
        <h3>PDF 工具</h3>
        <p>合併・分割・旋轉・加密</p>
      </a>

      <a class="tool-card" href="tools/image.html">
        <div class="icon">🖼️</div>
        <h3>圖片壓縮</h3>
        <p>批次轉檔・壓縮・下載</p>
      </a>

      <a class="tool-card" href="tools/index.html">
        <div class="icon">🔍</div>
        <h3>資訊稽核工具</h3>
        <p>日誌抽樣・異常偵測・報告產出</p>
      </a>

      <div class="tool-card disabled">
        <div class="icon" style="color:#bdc3c7">＋</div>
        <h3>即將推出</h3>
        <p>持續新增工具中</p>
      </div>

    </div>
  </div>

  <div class="footer">工具箱 v1.0</div>
</body>
</html>
